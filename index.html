<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mapa Mental – Diccionario EDT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#eef0f4;--white:#fff;
  --c0:#f97316;--c1:#8b5cf6;--c2:#0ea5e9;--c3:#10b981;--c4:#ef4444;
  --l0:#fff4ed;--l1:#f5f3ff;--l2:#e0f2fe;--l3:#f0fdf4;--l4:#fff1f2;
  --center:#1e1b4b;
  --sh:0 3px 18px rgba(0,0,0,.11);--sh-sm:0 2px 8px rgba(0,0,0,.08);
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Inter',sans-serif;background:var(--bg)}

/* ── TOPBAR ─────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:300;height:56px;
  background:rgba(255,255,255,.97);backdrop-filter:blur(16px);
  border-bottom:1px solid #e5e7eb;
  display:flex;align-items:center;padding:0 20px;
}
.tb-left{display:flex;align-items:center;gap:10px;flex:0 0 auto;width:280px}
.tb-logo{width:32px;height:32px;border-radius:9px;background:var(--c0);display:grid;place-items:center;font-family:'Sora',sans-serif;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.tb-author{font-family:'Sora',sans-serif;font-size:12.5px;font-weight:800;color:#111;line-height:1.2}
.tb-name{font-size:10px;font-weight:600;color:#374151}
.tb-sub{font-size:8.5px;color:#9ca3af;letter-spacing:.2px}
.tb-mid{flex:1;display:flex;justify-content:center;align-items:center;gap:6px}
.pill{padding:4px 12px;border-radius:20px;border:1.5px solid;font-size:10.5px;font-weight:600;cursor:pointer;background:var(--white);display:flex;align-items:center;gap:5px;transition:all .15s;white-space:nowrap}
.pill:hover{transform:translateY(-1px);box-shadow:var(--sh-sm)}
.pill.on{color:#fff!important;border-color:transparent!important}
.pdot{width:7px;height:7px;border-radius:50%}
.tb-right{width:280px}

/* ── STAGE ──────────────────────────────── */
#stage{position:fixed;top:56px;left:0;right:0;bottom:34px;overflow:hidden;cursor:grab;touch-action:none}
#stage.grabbing{cursor:grabbing}
#svg-bg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:visible}

/* ── NODES — always screen-space, no scale blur ── */
.nd{position:absolute;user-select:none;will-change:left,top;transition:opacity .25s}

/* center */
.nc{width:140px;background:var(--center);border-radius:18px;padding:15px 12px;text-align:center;box-shadow:var(--sh);cursor:grab}
.nc:hover{box-shadow:0 6px 28px rgba(30,27,75,.28)}
.nc-ic{font-size:20px;margin-bottom:5px}
.nc-t{font-family:'Sora',sans-serif;font-size:11.5px;font-weight:800;color:#fff;line-height:1.25}
.nc-s{font-size:8.5px;color:#a5b4fc;margin-top:3px}

/* phase */
.np{border-radius:13px;padding:11px 14px;width:155px;box-shadow:var(--sh);cursor:pointer}
.np:hover{filter:brightness(1.07)}
.np-code{font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:3px}
.np-title{font-family:'Sora',sans-serif;font-size:11.5px;font-weight:700;color:#fff;line-height:1.3}
.np.selected{outline:3px solid rgba(255,255,255,.9);outline-offset:2px;box-shadow:0 0 0 6px rgba(255,255,255,.18),var(--sh)}

/* sub */
.ns{background:var(--white);border-radius:9px;padding:8px 11px;width:152px;border-left:3px solid;box-shadow:var(--sh-sm);cursor:grab}
.ns-code{font-size:7.5px;font-weight:700;letter-spacing:.8px;margin-bottom:2px}
.ns-title{font-size:10.5px;font-weight:600;color:#111;line-height:1.3}

/* leaf */
.nl{background:var(--white);border-radius:7px;padding:7px 10px;width:144px;border-left:2px solid;box-shadow:0 1px 6px rgba(0,0,0,.07);cursor:grab}
.nl.deliv{background:#fffbeb}
.nl-code{font-size:7.5px;font-weight:700;letter-spacing:.7px;margin-bottom:2px}
.nl-title{font-size:10px;color:#4b5563;font-weight:500;line-height:1.3}
.nl.deliv .nl-title{color:#92400e}

/* dim */
.nd.dim{opacity:.07;pointer-events:none}

/* ── TOOLTIP ─────────────────────────────── */
#tip{position:fixed;z-index:500;background:rgba(15,15,30,.93);color:#fff;border-radius:9px;padding:9px 13px;font-size:11px;line-height:1.5;max-width:240px;pointer-events:none;opacity:0;transition:opacity .12s;box-shadow:0 6px 24px rgba(0,0,0,.22)}
#tip.show{opacity:1}
#tip-code{font-size:8.5px;font-weight:700;letter-spacing:1px;color:#a5b4fc;margin-bottom:3px}

/* ── FOOTER ──────────────────────────────── */
#footer{position:fixed;bottom:0;left:0;right:0;height:34px;z-index:300;background:rgba(255,255,255,.95);backdrop-filter:blur(10px);border-top:1px solid #e5e7eb;display:flex;align-items:center;justify-content:center;gap:16px;font-size:10px;color:#6b7280;font-weight:500}
.fi{display:flex;align-items:center;gap:5px}
.fd{width:8px;height:8px;border-radius:50%}

/* ── FOCUS OVERLAY (expanded phase view) ─── */
#overlay{
  position:fixed;top:56px;left:0;right:0;bottom:34px;z-index:200;
  background:rgba(238,240,244,.0);
  pointer-events:none;
  transition:background .3s;
}
#overlay.active{pointer-events:auto;background:rgba(238,240,244,.82);backdrop-filter:blur(4px)}

#focus-panel{
  position:fixed;top:56px;left:0;right:0;bottom:34px;z-index:210;
  display:none;align-items:center;justify-content:center;
  padding:20px;
}
#focus-panel.active{display:flex}

.fp-inner{
  background:var(--white);
  border-radius:20px;
  box-shadow:0 12px 60px rgba(0,0,0,.18);
  padding:28px 32px;
  max-width:900px;width:100%;
  max-height:calc(100vh - 140px);
  overflow-y:auto;
  position:relative;
}
.fp-close{
  position:absolute;top:16px;right:16px;
  width:32px;height:32px;border-radius:50%;background:#f3f4f6;border:none;
  font-size:16px;cursor:pointer;display:grid;place-items:center;
  transition:background .15s;
}
.fp-close:hover{background:#e5e7eb}
.fp-header{display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #f3f4f6}
.fp-badge{border-radius:10px;padding:10px 14px;display:flex;flex-direction:column;gap:3px;flex-shrink:0}
.fp-code{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.75)}
.fp-title{font-family:'Sora',sans-serif;font-size:14px;font-weight:800;color:#fff;line-height:1.25}
.fp-desc{font-size:11px;color:#6b7280}

/* sub columns inside panel */
.fp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:16px}
.fp-sub{border-radius:12px;border:1px solid #f3f4f6;padding:14px 16px;background:#fafbfc}
.fp-sub-header{display:flex;align-items:center;gap:9px;margin-bottom:12px;padding-bottom:10px;border-bottom:1px solid #f3f4f6}
.fp-sub-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.fp-sub-code{font-size:8.5px;font-weight:700;letter-spacing:.8px}
.fp-sub-title{font-size:11.5px;font-weight:700;color:#111;line-height:1.3}
.fp-leaf{display:flex;align-items:flex-start;gap:10px;padding:9px 10px;background:var(--white);border-radius:8px;margin-bottom:6px;border:1px solid #f3f4f6;transition:border-color .15s}
.fp-leaf:hover{border-color:#d1d5db}
.fp-leaf:last-child{margin-bottom:0}
.fp-leaf.deliv{background:#fffbeb;border-color:#fed7aa}
.fp-leaf-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.fp-leaf-body{}
.fp-leaf-code{font-size:8px;font-weight:700;letter-spacing:.7px;margin-bottom:2px}
.fp-leaf-title{font-size:11px;font-weight:600;color:#374151;line-height:1.35}
.fp-leaf-desc{font-size:10px;color:#6b7280;margin-top:3px;line-height:1.4}
.fp-leaf.deliv .fp-leaf-title{color:#92400e}
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="tb-left">
    <div class="tb-logo">EDT</div>
    <div>
      <div class="tb-author">Eder L. Cosme</div>
      <div class="tb-name">Diccionario EDT</div>
      <div class="tb-sub">UNIVERSIDAD NACIONAL ABIERTA Y A DISTANCIA</div>
    </div>
  </div>
  <div class="tb-mid" id="pills"></div>
  <div class="tb-right"></div>
</div>

<div id="stage"><svg id="svg-bg" xmlns="http://www.w3.org/2000/svg"></svg></div>

<!-- FOCUS OVERLAY -->
<div id="overlay" onclick="closeFocus()"></div>
<div id="focus-panel">
  <div class="fp-inner" id="fp-inner">
    <button class="fp-close" onclick="closeFocus()">✕</button>
    <div class="fp-header" id="fp-header"></div>
    <div class="fp-grid" id="fp-grid"></div>
  </div>
</div>

<div id="tip"><div id="tip-code"></div><div id="tip-body"></div></div>

<div id="footer">
  <div class="fi"><div class="fd" style="background:#f97316"></div>1.0 Gestión</div>
  <div class="fi"><div class="fd" style="background:#8b5cf6"></div>2.0 Diagnóstico</div>
  <div class="fi"><div class="fd" style="background:#0ea5e9"></div>3.0 KPIs</div>
  <div class="fi"><div class="fd" style="background:#10b981"></div>4.0 Prototipo</div>
  <div class="fi"><div class="fd" style="background:#ef4444"></div>5.0 Validación</div>
  <div style="color:#d1d5db">·</div>
  <div class="fi"><div class="fd" style="background:#f97316;border-radius:2px"></div>⭐ Entregable</div>
</div>

<script>
/* ════════════════════════════════════════════
   DATA
════════════════════════════════════════════ */
const COLORS=['#f97316','#8b5cf6','#0ea5e9','#10b981','#ef4444'];
const LIGHTS=['#fff4ed','#f5f3ff','#e0f2fe','#f0fdf4','#fff1f2'];
const NAMES=['Gestión','Diagnóstico','KPIs','Prototipo','Validación'];

const DATA=[
  { code:'1.0', title:'Gestión\ndel Proyecto',
    subs:[
      { code:'1.1', title:'Planificación\ndel Proyecto',
        leaves:[
          {code:'1.1.1',title:'Definición del Alcance',desc:'Marco, límites del proyecto, interesados y acuerdos de entrega.'},
          {code:'1.1.2',title:'Cronograma y Gestión de Riesgos',desc:'Línea base de tiempo, registro de riesgos y planes de contingencia.'},
        ]},
      { code:'1.2', title:'Seguimiento\ny Control',
        leaves:[
          {code:'1.2.1',title:'Control de Avance y Comunicación',desc:'Monitoreo periódico del progreso e informes a partes interesadas.'},
        ]},
    ]},
  { code:'2.0', title:'Diagnóstico\nInstitucional',
    subs:[
      { code:'2.1', title:'Análisis\nDocumental',
        leaves:[
          {code:'2.1.1',title:'Revisión Normativa CNA',desc:'Resoluciones, lineamientos y estándares del Consejo Nacional de Acreditación.'},
          {code:'2.1.2',title:'Revisión Informes Autoevaluación IES',desc:'Sistematización de informes previos de autoevaluación institucional.'},
        ]},
      { code:'2.2', title:'Trabajo de Campo\ncon IES',
        leaves:[
          {code:'2.2.1',title:'Selección, Contacto y Consentimiento',desc:'Identificación de IES y gestión de consentimientos informados.'},
          {code:'2.2.2',title:'Entrevistas Semiestructuradas',desc:'Instrumentos cualitativos para identificar brechas y necesidades.'},
        ]},
      { code:'2.3', title:'⭐ Matriz\nDiagnóstica', deliverable:true,
        leaves:[
          {code:'2.3.1',title:'Elaboración Matriz Diagnóstica',desc:'Consolidación de hallazgos documentales y de campo.',deliverable:true},
        ]},
    ]},
  { code:'3.0', title:'Catálogo\nde KPIs',
    subs:[
      { code:'3.1', title:'Catálogo\nPreliminar',
        leaves:[
          {code:'3.1.1',title:'Inventario y Ficha Técnica Indicadores',desc:'KPIs potenciales con fórmulas, fuentes y periodicidad.'},
          {code:'3.1.2',title:'Instrumentos Panel Delphi',desc:'Rondas de consulta, escalas de valoración y criterios de consenso.'},
        ]},
      { code:'3.2', title:'Panel Delphi\nValidación KPIs',
        leaves:[
          {code:'3.2.1',title:'Convocatoria Panel de Expertos',desc:'Selección e invitación de expertos en acreditación y BI.'},
          {code:'3.2.2',title:'Rondas Delphi y Cálculo CVI',desc:'Rondas iterativas e Índice de Validez de Contenido.'},
        ]},
      { code:'3.3', title:'⭐ Catálogo\nValidado KPIs', deliverable:true,
        leaves:[
          {code:'3.3.1',title:'Documentación y Revisión Final',desc:'Catálogo definitivo con fichas técnicas y reporte de consenso.',deliverable:true},
        ]},
    ]},
  { code:'4.0', title:'Prototipo\nQlik Sense',
    subs:[
      { code:'4.1', title:'Arquitectura ETL\ny Data Mart',
        leaves:[
          {code:'4.1.1',title:'Modelo de Datos Educativo',desc:'Esquema dimensional con tablas de hechos y dimensiones.'},
          {code:'4.1.2',title:'Proceso ETL – Sprint 1 (Sem. 11–12)',desc:'Extracción, transformación y carga al Data Mart.'},
        ]},
      { code:'4.2', title:'Dashboards\nQlik Sense',
        leaves:[
          {code:'4.2.1',title:'Dashboards – Sprints 2–3 (Sem. 13–16)',desc:'Paneles visuales interactivos con KPIs validados.'},
          {code:'4.2.2',title:'Control de Calidad del Prototipo',desc:'Verificación funcional, integridad de datos y UX.'},
        ]},
      { code:'4.3', title:'⭐ Prototipo\nFuncional BI', deliverable:true,
        leaves:[
          {code:'4.3.1',title:'Documentación y Despliegue',desc:'Manual técnico, guía de usuario y despliegue controlado.',deliverable:true},
        ]},
    ]},
  { code:'5.0', title:'Validación\ndel Prototipo',
    subs:[
      { code:'5.1', title:'Sesión Piloto\ncon Usuarios',
        leaves:[
          {code:'5.1.1',title:'Preparación Sesión de Validación',desc:'Protocolo de prueba, selección de usuarios y entorno.'},
          {code:'5.1.2',title:'Aplicación Protocolo SUS',desc:'System Usability Scale aplicado en sesiones controladas.'},
        ]},
      { code:'5.2', title:'Análisis y Ajustes\nPost-Validación',
        leaves:[
          {code:'5.2.1',title:'Análisis Cuantitativo de Usabilidad',desc:'Resultados SUS, tiempos de tarea y tasas de error.'},
          {code:'5.2.2',title:'Ajustes al Prototipo – Sprint 4 (Sem. 19–20)',desc:'Mejoras priorizadas de usabilidad para la versión final.'},
        ]},
      { code:'5.3', title:'⭐ Informe\nFinal Validación', deliverable:true,
        leaves:[
          {code:'5.3.1',title:'Informe Validación y Cierre del Proyecto',desc:'Hallazgos, conclusiones, lecciones aprendidas y cierre formal.',deliverable:true},
        ]},
    ]},
];

/* ════════════════════════════════════════════
   LAYOUT — TRUE RADIAL TREE, collision-free
   
   Key insight: compute the ANGULAR SPAN each
   subtree needs based on its leaf count, then
   assign arcs proportionally. This guarantees
   no overlap at any distance.
════════════════════════════════════════════ */

const stage  = document.getElementById('stage');
const svgEl  = document.getElementById('svg-bg');
const SW = stage.clientWidth  || window.innerWidth;
const SH = stage.clientHeight || (window.innerHeight - 90);

// Node sizes in world units
const PH_W=155, PH_H=70;
const SB_W=152, SB_H=62;
const LF_W=144, LF_H=56;

// Radial distances
const R_PHASE = 300;
const R_SUB   = 490;
const R_LEAF  = 680;

// Minimum angular gap (radians) between two adjacent nodes of same type
// = 2 * atan(halfNodeWidth / radius) + buffer
function minArc(halfW, R){ return 2*(Math.atan2(halfW+18, R)); }

// Total leaves across all phases (for proportional sector sizing)
const totalLeaves = DATA.reduce((s,ph)=>s+ph.subs.reduce((s2,sb)=>s2+sb.leaves.length,0),0);

// Assign each phase a sector proportional to its leaf count
// Phases go around 360° starting from left (180°) going clockwise
function buildLayout(){
  const positions = {};
  const cx = SW/2, cy = SH/2;
  positions['center'] = {x:cx, y:cy};

  let angleStart = Math.PI; // start at left, go clockwise
  const TWO_PI = 2*Math.PI;

  DATA.forEach((ph, pi)=>{
    // count leaves in this phase
    const phLeaves = ph.subs.reduce((s,sb)=>s+sb.leaves.length, 0);
    // sector angle for this phase
    const sector = (phLeaves / totalLeaves) * TWO_PI;
    const phAngle = angleStart + sector/2;
    angleStart += sector;

    const px = cx + R_PHASE * Math.cos(phAngle);
    const py = cy + R_PHASE * Math.sin(phAngle);
    positions[ph.code] = {x:px, y:py, angle:phAngle};

    // distribute subs within this sector
    const ns = ph.subs.length;
    const subMinArc = minArc(SB_W/2, R_SUB);
    const subTotalArc = (ns-1)*subMinArc;
    const subStart = phAngle - subTotalArc/2;

    ph.subs.forEach((sub, si)=>{
      const sAngle = ns===1 ? phAngle : subStart + si*subMinArc;
      const sx = cx + R_SUB * Math.cos(sAngle);
      const sy = cy + R_SUB * Math.sin(sAngle);
      positions[sub.code] = {x:sx, y:sy, angle:sAngle};

      // distribute leaves
      const nl = sub.leaves.length;
      const lfMinArc = minArc(LF_W/2, R_LEAF);
      const lfTotalArc = (nl-1)*lfMinArc;
      const lfStart = sAngle - lfTotalArc/2;

      sub.leaves.forEach((lf, li)=>{
        const lAngle = nl===1 ? sAngle : lfStart + li*lfMinArc;
        const lx = cx + R_LEAF * Math.cos(lAngle);
        const ly = cy + R_LEAF * Math.sin(lAngle);
        positions[lf.code] = {x:lx, y:ly};
      });
    });
  });
  return positions;
}

/* ════════════════════════════════════════════
   STATE
════════════════════════════════════════════ */
let pos = buildLayout();
const nodeEls = {};
const pathEls = [];
const phaseChildren = {};
DATA.forEach(ph=>{
  phaseChildren[ph.code]=[];
  ph.subs.forEach(sb=>{
    phaseChildren[ph.code].push(sb.code);
    sb.leaves.forEach(lf=>phaseChildren[ph.code].push(lf.code));
  });
});

let vpX=0, vpY=0, vpS=1;
function toScreen(wx,wy){return{sx:wx*vpS+vpX, sy:wy*vpS+vpY}}

/* ════════════════════════════════════════════
   DOM BUILD
════════════════════════════════════════════ */
const tip     = document.getElementById('tip');
const tipCode = document.getElementById('tip-code');
const tipBody = document.getElementById('tip-body');

function mkNode(code, cls, html, z){
  const el=document.createElement('div');
  el.className='nd '+cls;
  el.style.zIndex=z;
  el.innerHTML=html;
  stage.appendChild(el);
  nodeEls[code]=el;
  return el;
}
function mkPath(from,to,color,w,dash,op){
  const p=document.createElementNS('http://www.w3.org/2000/svg','path');
  p.setAttribute('fill','none');
  p.setAttribute('stroke',color);
  p.setAttribute('stroke-width',w);
  p.setAttribute('stroke-linecap','round');
  if(dash)p.setAttribute('stroke-dasharray',dash);
  p.setAttribute('opacity',op);
  svgEl.appendChild(p);
  pathEls.push({el:p,from,to,baseOp:op});
}

function buildDOM(){
  mkNode('center','nc',`
    <div class="nc-ic">🗂️</div>
    <div class="nc-t">Diccionario<br>EDT</div>
    <div class="nc-s">Estructura de Desglose<br>del Trabajo</div>
  `,30);

  DATA.forEach((ph,pi)=>{
    const color=COLORS[pi], light=LIGHTS[pi];
    mkPath('center',ph.code,color,2.5,'',0.55);

    const pEl=mkNode(ph.code,'np',`
      <div class="np-code">${ph.code}</div>
      <div class="np-title">${ph.title.replace(/\n/g,'<br>')}</div>
    `,20);
    pEl.style.background=color;

    ph.subs.forEach(sub=>{
      mkPath(ph.code,sub.code,color,1.9,'6,4',0.45);
      const sEl=mkNode(sub.code,'ns',`
        <div class="ns-code" style="color:${color}">${sub.code}</div>
        <div class="ns-title">${sub.title.replace(/\n/g,'<br>')}</div>
      `,12);
      sEl.style.borderLeftColor=color;
      if(sub.deliverable)sEl.style.background=light;

      sub.leaves.forEach(lf=>{
        mkPath(sub.code,lf.code,color,1.3,'3,4',0.4);
        const lEl=mkNode(lf.code,'nl'+(lf.deliverable?' deliv':''),`
          <div class="nl-code" style="color:${color}">${lf.code}</div>
          <div class="nl-title">${lf.title.replace(/\n/g,'<br>')}</div>
        `,8);
        lEl.style.borderLeftColor=color;
        lEl.addEventListener('mouseenter',e=>{tipCode.textContent=lf.code;tipBody.textContent=lf.desc;tip.classList.add('show');mvTip(e)});
        lEl.addEventListener('mousemove',mvTip);
        lEl.addEventListener('mouseleave',()=>tip.classList.remove('show'));
      });
    });
  });
}
function mvTip(e){let x=e.clientX+14,y=e.clientY-8;if(x+250>window.innerWidth)x=e.clientX-260;tip.style.left=x+'px';tip.style.top=y+'px'}

/* ════════════════════════════════════════════
   RENDER
════════════════════════════════════════════ */
function render(){
  Object.keys(nodeEls).forEach(code=>{
    const{sx,sy}=toScreen(pos[code].x,pos[code].y);
    const el=nodeEls[code];
    el.style.left=sx+'px';el.style.top=sy+'px';
    el.style.transform='translate(-50%,-50%)';
  });
  pathEls.forEach(pe=>{
    const a=toScreen(pos[pe.from].x,pos[pe.from].y);
    const b=toScreen(pos[pe.to].x,pos[pe.to].y);
    const mx=(a.sx+b.sx)/2;
    pe.el.setAttribute('d',`M${a.sx},${a.sy} C${mx},${a.sy} ${mx},${b.sy} ${b.sx},${b.sy}`);
  });
}

/* ════════════════════════════════════════════
   FILTER (dim/highlight on map)
════════════════════════════════════════════ */
let activePhase=null;

function applyFilter(phIdx){
  if(phIdx===null){
    Object.values(nodeEls).forEach(el=>el.classList.remove('dim','selected'));
    pathEls.forEach(pe=>pe.el.style.opacity=pe.baseOp);
    return;
  }
  const keep=new Set(['center',DATA[phIdx].code,...phaseChildren[DATA[phIdx].code]]);
  Object.keys(nodeEls).forEach(c=>{
    nodeEls[c].classList.toggle('dim',!keep.has(c));
    nodeEls[c].classList.toggle('selected',c===DATA[phIdx].code);
  });
  pathEls.forEach(pe=>{
    pe.el.style.opacity=(keep.has(pe.from)&&keep.has(pe.to))?.75:.04;
  });
}

/* ════════════════════════════════════════════
   FOCUS PANEL — expanded detail view
════════════════════════════════════════════ */
const overlay   = document.getElementById('overlay');
const focusPanel= document.getElementById('focus-panel');
const fpHeader  = document.getElementById('fp-header');
const fpGrid    = document.getElementById('fp-grid');

function openFocus(pi){
  const ph=DATA[pi], color=COLORS[pi], light=LIGHTS[pi];
  // header
  fpHeader.innerHTML=`
    <div class="fp-badge" style="background:${color}">
      <div class="fp-code">${ph.code}</div>
      <div class="fp-title">${ph.title.replace(/\n/g,' ')}</div>
    </div>
    <div class="fp-desc">Haz clic en cualquier actividad para ver su detalle. Cierra con ✕ o clic fuera del panel.</div>
  `;
  // grid
  fpGrid.innerHTML='';
  ph.subs.forEach(sub=>{
    const col=document.createElement('div');
    col.className='fp-sub';
    col.style.borderTop=`3px solid ${color}`;
    col.innerHTML=`
      <div class="fp-sub-header">
        <div class="fp-sub-dot" style="background:${color}"></div>
        <div>
          <div class="fp-sub-code" style="color:${color}">${sub.code}</div>
          <div class="fp-sub-title">${sub.title.replace(/\n/g,' ')}</div>
        </div>
      </div>
    `;
    sub.leaves.forEach(lf=>{
      const card=document.createElement('div');
      card.className='fp-leaf'+(lf.deliverable?' deliv':'');
      card.innerHTML=`
        <div class="fp-leaf-dot" style="background:${lf.deliverable?'#f97316':color}"></div>
        <div class="fp-leaf-body">
          <div class="fp-leaf-code" style="color:${color}">${lf.code}</div>
          <div class="fp-leaf-title">${lf.title.replace(/\n/g,' ')}</div>
          <div class="fp-leaf-desc">${lf.desc}</div>
        </div>
      `;
      col.appendChild(card);
    });
    fpGrid.appendChild(col);
  });

  overlay.classList.add('active');
  focusPanel.classList.add('active');
}

function closeFocus(){
  overlay.classList.remove('active');
  focusPanel.classList.remove('active');
}
// Prevent clicks inside panel from closing
document.getElementById('fp-inner').addEventListener('click',e=>e.stopPropagation());

/* ════════════════════════════════════════════
   PILLS
════════════════════════════════════════════ */
const pillsEl=document.getElementById('pills');
COLORS.forEach((color,i)=>{
  const pill=document.createElement('div');
  pill.className='pill';
  pill.style.color=color;pill.style.borderColor=color+'60';
  pill.innerHTML=`<span class="pdot" style="background:${color}"></span>${NAMES[i]}`;
  pill.addEventListener('click',()=>{
    if(activePhase===i){
      activePhase=null;
      pill.classList.remove('on');pill.style.background='';pill.style.color=color;pill.style.borderColor=color+'60';
      applyFilter(null);
      closeFocus();
    } else {
      if(activePhase!==null){
        pillsEl.children[activePhase].classList.remove('on');
        pillsEl.children[activePhase].style.background='';
        pillsEl.children[activePhase].style.color=COLORS[activePhase];
        pillsEl.children[activePhase].style.borderColor=COLORS[activePhase]+'60';
      }
      activePhase=i;
      pill.classList.add('on');pill.style.background=color;pill.style.color='#fff';pill.style.borderColor=color;
      applyFilter(i);
      openFocus(i);
    }
  });
  pillsEl.appendChild(pill);
});

/* ════════════════════════════════════════════
   DRAG — phase moves whole group
════════════════════════════════════════════ */
let hasDragged=false;
function enableDrag(code,extra=[]){
  const el=nodeEls[code];if(!el)return;
  let on=false,sx0=0,sy0=0;const snap={};
  el.addEventListener('pointerdown',e=>{
    e.stopPropagation();on=true;hasDragged=false;
    el.setPointerCapture(e.pointerId);el.style.cursor='grabbing';
    sx0=e.clientX;sy0=e.clientY;
    [code,...extra].forEach(c=>{snap[c]={...pos[c]}});
    el.style.zIndex=300;
  });
  el.addEventListener('pointermove',e=>{
    if(!on)return;
    const dx=e.clientX-sx0,dy=e.clientY-sy0;
    if(Math.abs(dx)>3||Math.abs(dy)>3)hasDragged=true;
    const wdx=dx/vpS,wdy=dy/vpS;
    [code,...extra].forEach(c=>{pos[c].x=snap[c].x+wdx;pos[c].y=snap[c].y+wdy});
    render();
  });
  el.addEventListener('pointerup',()=>{on=false;el.style.cursor='grab';el.style.zIndex=''});
}

/* ════════════════════════════════════════════
   PAN + ZOOM
════════════════════════════════════════════ */
let panning=false,psx=0,psy=0,pvx=0,pvy=0;
stage.addEventListener('pointerdown',e=>{
  if(e.target!==stage&&e.target!==svgEl)return;
  panning=true;stage.setPointerCapture(e.pointerId);
  psx=e.clientX;psy=e.clientY;pvx=vpX;pvy=vpY;
  stage.classList.add('grabbing');
});
stage.addEventListener('pointermove',e=>{if(!panning)return;vpX=pvx+(e.clientX-psx);vpY=pvy+(e.clientY-psy);render()});
stage.addEventListener('pointerup',()=>{panning=false;stage.classList.remove('grabbing')});
stage.addEventListener('wheel',e=>{
  e.preventDefault();
  const mx=e.clientX,my=e.clientY-56;
  const f=e.deltaY<0?1.1:.91;
  const ns=Math.min(2.8,Math.max(0.18,vpS*f));
  vpX=mx-(mx-vpX)*(ns/vpS);vpY=my-(my-vpY)*(ns/vpS);vpS=ns;render();
},{passive:false});

/* ════════════════════════════════════════════
   INIT
════════════════════════════════════════════ */
buildDOM();

// Phase: click opens focus + filter, drag moves group
DATA.forEach((ph,pi)=>{
  enableDrag(ph.code,phaseChildren[ph.code]);
  nodeEls[ph.code].addEventListener('click',e=>{
    if(hasDragged)return;
    const pill=pillsEl.children[pi];
    if(activePhase===pi){
      activePhase=null;
      pill.classList.remove('on');pill.style.background='';pill.style.color=COLORS[pi];pill.style.borderColor=COLORS[pi]+'60';
      applyFilter(null);closeFocus();
    } else {
      if(activePhase!==null){
        pillsEl.children[activePhase].classList.remove('on');
        pillsEl.children[activePhase].style.background='';
        pillsEl.children[activePhase].style.color=COLORS[activePhase];
        pillsEl.children[activePhase].style.borderColor=COLORS[activePhase]+'60';
      }
      activePhase=pi;
      pill.classList.add('on');pill.style.background=COLORS[pi];pill.style.color='#fff';pill.style.borderColor=COLORS[pi];
      applyFilter(pi);openFocus(pi);
    }
  });
});
enableDrag('center');
DATA.forEach(ph=>{
  ph.subs.forEach(sb=>{
    enableDrag(sb.code,sb.leaves.map(l=>l.code));
    sb.leaves.forEach(lf=>enableDrag(lf.code));
  });
});

// Auto-fit
const allX=Object.values(pos).map(p=>p.x);
const allY=Object.values(pos).map(p=>p.y);
const pad=90;
const bMinX=Math.min(...allX)-pad,bMaxX=Math.max(...allX)+pad;
const bMinY=Math.min(...allY)-pad,bMaxY=Math.max(...allY)+pad;
const bCX=(bMinX+bMaxX)/2,bCY=(bMinY+bMaxY)/2;
vpS=Math.min(SW/(bMaxX-bMinX),SH/(bMaxY-bMinY))*0.90;
vpX=SW/2-bCX*vpS;vpY=SH/2-bCY*vpS;
render();
</script>
</body>
</html>
